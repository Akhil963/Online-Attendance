# Docker Compose for Local Development
version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: attendance-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - attendance-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://attendance_user:attendance_password@mongodb:27017/attendance_system?authSource=attendance_system
      JWT_SECRET: ${JWT_SECRET:-your_secure_jwt_secret_key_change_in_production}
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      EMAIL_USER: ${EMAIL_USER:-your_email@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your_app_password}
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - attendance-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - attendance-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  attendance-network:
    driver: bridge
