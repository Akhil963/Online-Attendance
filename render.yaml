services:
  - type: web
    name: attendance-system-backend
    runtime: node
    plan: standard
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SESSION_SECRET
        sync: false
    
    # Health check
    healthCheckPath: /api/health
    
    # Auto-deploy
    autoDeploy: true
    
    # Resource limits
    maxInstanceCount: 3
    minInstanceCount: 1
    
    # Build configuration
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json

  # Uncomment to add database service (if not using MongoDB Atlas)
  # - type: pserv
  #   name: mongodb-database
  #   runtime: mongo
  #   plan: standard
  #   mongoDbVersion: 6.0

databases:
  # If using MongoDB Atlas, ensure connection string is in envVars
  # If deploying MongoDB on Render, add:
