name: Deploy to Production

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
      
      - name: Health check endpoint test
        working-directory: backend
        run: node -e "console.log('Backend configuration valid')"

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://api.example.com/api' }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL || 'https://api.example.com' }}
        run: npm run build
      
      - name: Lint
        working-directory: frontend
        run: npm run test --if-present -- --passWithNoTests

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    name: Deploy Backend to Render
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          curl -X POST https://api.render.com/deploy/srv/$RENDER_SERVICE_ID \
            -H "Authorization: Bearer $RENDER_API_KEY"

  deploy-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    name: Deploy Frontend to Vercel
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy \
            --token $VERCEL_TOKEN \
            --prod \
            --scope $VERCEL_ORG_ID

  verify-deployment:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    name: Verify Deployment
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Health check
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -f ${{ secrets.BACKEND_URL }}/api/health; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          exit 1
      
      - name: Frontend deployment check
        run: |
          echo "Verifying frontend deployment..."
          curl -f ${{ secrets.FRONTEND_URL }}/ > /dev/null 2>&1 && echo "Frontend is accessible"
