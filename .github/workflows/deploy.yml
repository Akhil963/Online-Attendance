name: Deploy to Production

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Lint
        working-directory: backend
        run: npm run lint --if-present
      
      - name: Health check endpoint test
        working-directory: backend
        run: node -e "console.log('Backend configuration valid')"

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://api.example.com/api' }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL || 'https://api.example.com' }}
        run: npm run build
      
      - name: Lint
        working-directory: frontend
        run: npm run test --if-present -- --passWithNoTests

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    name: Deploy Backend to Render
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          curl -X POST $RENDER_DEPLOY_HOOK

  deploy-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    name: Deploy Frontend to Vercel
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          production: true

  verify-deployment:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    name: Verify Deployment
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Health check
        run: |
          echo "Waiting for backend to be ready..."
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "Warning: BACKEND_URL secret is not set, skipping backend health check"
          else
            for i in {1..30}; do
              if curl -f $BACKEND_URL/api/health; then
                echo "Backend is healthy"
                exit 0
              fi
              echo "Attempt $i/30 - waiting..."
              sleep 10
            done
            echo "Backend health check failed"
            exit 1
          fi
      
      - name: Frontend deployment check
        run: |
          echo "Verifying frontend deployment..."
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            echo "Warning: FRONTEND_URL secret is not set, skipping frontend check"
          else
            if curl -f $FRONTEND_URL/ > /dev/null 2>&1; then
              echo "Frontend is accessible"
            else
              echo "Frontend is not accessible"
              exit 1
            fi
          fi
